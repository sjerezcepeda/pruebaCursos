<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow p-4">
        <h2 class="text-center mb-4">Login Estudiante</h2>

        <div class="mb-3">
          <label class="form-label">Usuario</label>
          <input
            type="text"
            class="form-control"
            [(ngModel)]="usuario"
            name="usuario"
            required
            maxlength="30"
            #usuarioInput="ngModel">

          <div class="text-danger mt-1" *ngIf="usuarioInput.errors?.['required'] && usuarioInput.touched">
            El usuario es obligatorio.
          </div>
        </div>

        <div class="mb-3">
          <label class="form-label">Contraseña</label>
          <input
            type="password"
            class="form-control"
            [(ngModel)]="clave"
            name="clave"
            required
            maxlength="30"
            #claveInput="ngModel">

          <div class="text-danger mt-1" *ngIf="claveInput.errors?.['required'] && claveInput.touched">
            La contraseña es obligatoria.
          </div>
        </div>

        <button class="btn btn-primary w-100" (click)="ingresar()">
          Ingresar
        </button>

        <div class="alert alert-danger mt-3 text-center" *ngIf="mensaje">
          {{ mensaje }}
        </div>
      </div>
    </div>
  </div>
</div>
